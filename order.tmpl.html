<!DOCTYPE html>
<html lang="en">
	<head>
		<script src="https://unpkg.com/htmx.org@1.9.5"></script>
		<meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <style>
            .content {
                counter-reset: h2;
            }

            .content h2 {
                counter-reset: h3;
                counter-increment: h2;
            }

            .content h2::before {
                content: counter(h2) ". ";
                font-weight: bold;
            }

            .content h3 {
                counter-increment: h3;
            }

            .content h3::before {
                content: counter(h2) "." counter(h3) " ";
            }

            .content {
                padding-bottom: 3%; 
            }

            .unsaved {
                border: 2px solid orange;
                background-color: #fff8e1;
                transition: border-color 0.3s, background-color 0.3s;
            }

            footer {
                background: #f0f0f0;
                padding-right: 1em;
                box-sizing: border-box;
                text-align: center;
                font-family: Arial, sans-serif;
                position: fixed;
                bottom: 0;
                width: 100%;
                height: 3%;
                box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
                display: flex; 
                justify-content: space-between;
            }
        </style>
	</head>
	<body>
		<div class="content">
			<h1>{{.OrderNr}}: {{.MainTask}}</h1>
			<div>
				<form id="infoForm"
				hx-post="/save" 
				hx-target="#infoForm" 
				hx-swap="outerHTML"
			  >
					<fieldset id="orderInfo">
						<legend>Info</legend>
						<div>
							<label>Main task:<input type="text" id="main-task" style="border: none;" name="order-info-main-task" value="{{.MainTask}}" required></label>
						</div>
		
						<div>
							<label>Responsible:<input type="text" id="responsible" style="border: none;" name="order-info-responsible" value="{{.Responsible}}" required></label>
						</div>
						
						<div>
							<label>Parent order:<input type="number" id="parent-order" style="border: none;" name="order-info-parent-order" value="{{.ParentOrder}}" min=1 required></label>
						</div>
						
						<div>
							<label>Deadline:<input type="date" id="deadline" style="border: none;"  name="order-info-deadline" value="{{.Deadline | formatToDate}}" min="2020-01-01" max="2100-12-31" required /></label>
						</div>

						<div>
							<label>State:<select id="states" name="order-info-state" style="border: none;" required>
								{{range .States}}
									<option value="{{.}}" {{if eq . $.State}}selected{{end}}>{{.}}</option>
								{{end}}
							</select></label>
						</div>
		
						<div>
							<button type="submit" hx-post="/save" hx-target="#result" hx-swap="innerHTML">Save</button>
						</div>
						<div id="result"></div>
						  
					</fieldset>
	
				  </form>
			</div>
	</body>

    <script>
        const namedElements = document.querySelectorAll('[name]');
        for (var i=0; i < namedElements.length; i++) {
            const elem = document.getElementById(namedElements[i].id)
            if (elem == undefined) {
                continue
            }
            const originalValueInfo = elem.value;
            elem.addEventListener('input', function () {
                if (this.value !== originalValueInfo) {
                    elem.classList.add('unsaved');
                } else {
                    elem.classList.remove('unsaved');
                }
            })
        }

		document.body.addEventListener("htmx:afterRequest", function (evt) {
		if (evt.detail.requestConfig && evt.detail.requestConfig.path === "/save") {
            if (evt.detail.xhr.status == 200) {
                document.querySelectorAll(".unsaved").forEach(el => el.classList.remove("unsaved"));
            }
		}
		});
    </script>
</html>
