<!DOCTYPE html>
<html lang="en">
	<head>
		<script src="https://unpkg.com/htmx.org@1.9.5"></script>
		<meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <style>
            .content {
                counter-reset: h2;
            }

            .content h2 {
                counter-reset: h3;
                counter-increment: h2;
            }

            .content h2::before {
                content: counter(h2) ". ";
                font-weight: bold;
            }

            .content h3 {
                counter-increment: h3;
            }

            .content h3::before {
                content: counter(h2) "." counter(h3) " ";
            }

            .content {
                padding-bottom: 3%; 
            }

            .unsaved {
                border: 2px solid orange;
                background-color: #fff8e1;
                transition: border-color 0.3s, background-color 0.3s;
            }

            footer {
                background: #f0f0f0;
                padding-right: 1em;
                box-sizing: border-box;
                text-align: center;
                font-family: Arial, sans-serif;
                position: fixed;
                bottom: 0;
                width: 100%;
                height: 3%;
                box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
                display: flex; 
                justify-content: space-between;
            }
        </style>
	</head>
	<body>
		<div class="content">
			<h1>{{.Info.OrderNr}}: {{.Info.MainTask}}</h1>
			<div>
				<form id="formInfo"
				hx-post="/save-info" 
				hx-target="#formInfo" 
				hx-swap="outerHTML"
			  >
					<fieldset id="orderInfo">
						<legend>Info</legend>
							<label>Main task:<input type="text" id="main-task" style="border: none;" name="order-info-main-task" value="{{.Info.MainTask}}" required></label><br>
							<label>Responsible:<input type="text" id="responsible" style="border: none;" name="order-info-responsible" value="{{.Info.Responsible}}" required></label><br>
							<label>Parent order:<input type="number" id="parent-order" style="border: none;" name="order-info-parent-order" value="{{.Info.ParentOrder}}" min=1 required></label><br>					
							<label>Deadline:<input type="date" id="deadline" style="border: none;"  name="order-info-deadline" value="{{.Info.Deadline | formatToDate}}" min="2020-01-01" max="2100-12-31" required /></label><br>
							<label>State:<select id="states" name="order-info-state" style="border: none;" required>
								{{range .Info.States}}
									<option value="{{.}}" {{if eq . $.Info.State}}selected{{end}}>{{.}}</option><br>
								{{end}}
							</select></label><br>
						
							<button type="submit" hx-post="/save-info" hx-target="#result-info" hx-swap="innerHTML">Save</button>
						<div id="result-info"></div>
						  
					</fieldset>
	
				  </form>
			</div>
            <h2>Execution</h2>
            <div>
                <form id="formExecution"
                hx-post="/save-tasks" 
				hx-target="#formExecution" 
				hx-swap="outerHTML"
                >
                <fieldset id="taskGroup">
                    <legend>Tasks</legend>
                        {{range .Tasks}}
                            <div id="task-div-{{.Id}}" name="task-div-{{.Id}}">
                                <label style="display: flex; gap: 10px; align-items: flex-start;">
                                <input type="checkbox" id="task-checkbox-{{.Id}}" name="task-checkbox-{{.Id}}" {{if .Checked}}checked{{end}}>
                                <textarea id="task-responsible-{{.Id}}" name="task-responsible-{{.Id}}" rows="1" cols="15" style="border: none;" required>{{.Responsible}}</textarea>
                                <textarea id="task-description-{{.Id}}" name="task-description-{{.Id}}" rows="1" cols="40" style="border: none;" required>{{.Description}}</textarea>
                                <button id="task-rm-btn-{{.Id}}" name="task-rm-btn-{{.Id}}" type="submit">Delete</button>
                                </label><br>
                            </div>
                        {{end}}
                        <button type="submit" hx-post="/save-tasks" hx-target="#result-tasks" hx-swap="innerHTML">Save</button>
                </fieldset>
                </form>
                <div id="result-tasks"></div>

                <form id="formAddExecute" style="margin-top: 1em; display: flex; gap: 10px; align-items: flex-start;">
                    <input type="text" id="new-task-responsible" name="new-task-responsible" placeholder="Responsible" required>
                    <textarea id="new-task-description" name="new-task-description" rows="1" cols="40" placeholder="Write your task here..." required></textarea>
                    <button type="submit" hx-post="/add-task" hx-target="#formExecution" hx-swap="innerHTML">Save</button>
                </form>                
            </div>

	</body>

    <script>
        const namedElements = document.querySelectorAll('[name]');

        for (var i=0; i < namedElements.length; i++) {
            const elem = document.getElementById(namedElements[i].id)
            if (elem == undefined) {
                continue
            }
            elem.addEventListener('input', function () {
                    if (elem.name?.includes("new-task-")) {
                        return
                    }
                    elem.classList.add('unsaved');

                    if (elem.name?.includes("task-")) {
                        const idx = elem.name.substring(elem.name.lastIndexOf('-') + 1);
                        const taskDiv = document.getElementById('task-div-'+idx);
                        taskDiv?.classList.add('unsaved');
                    }
            })
            if (elem.name?.includes("task-rm-btn-")) {
                elem?.addEventListener('click', function (e) {
                    const idx = elem.name.substring(elem.name.lastIndexOf('-') + 1);
                    document.getElementById('task-div-'+idx)?.remove();
                    let formExecution = document.getElementById('formExecution');
                    formExecution?.classList.add('unsaved');
                });
            }
        }        

		document.body.addEventListener("htmx:afterRequest", function (evt) {
            if (!evt.detail.requestConfig) {
                return
            }
            if (evt.detail.requestConfig.path === "/save-info") {
                if (evt.detail.xhr.status == 200) {
                    document.querySelectorAll(".unsaved").forEach(function(el){
                        if (document.getElementById(el.id).closest('form').id == "formInfo") {
                            el.classList.remove("unsaved");
                        }
                    })
                }
            }
            if (evt.detail.requestConfig.path === "/save-tasks") {
                if (evt.detail.xhr.status == 200) {
                    document.querySelectorAll(".unsaved").forEach(function(el){
                        if (document.getElementById(el.id).closest('form').id == "formExecution") {
                            el.classList.remove("unsaved");
                        }
                    })
                }
            }
            if (evt.detail.requestConfig.path === "/add-task") {
                const form = document.getElementById('formAddExecute');
                form?.reset();
            }
		});

    </script>
</html>
